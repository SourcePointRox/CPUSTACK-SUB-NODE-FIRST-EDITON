# WSL2 配置模板
# 放置位置：C:\Users\<用户名>\.wslconfig
# 保存后执行 wsl --shutdown 重启 WSL2

[wsl2]
# 限制 WSL2 最大内存（建议留 4-8GB 给 Windows）
# 根据物理内存调整：16GB 机器设 12GB，32GB 机器设 24GB
memory=24GB

# Swap 空间（防止模型加载时 OOM）
swap=8GB

# CPU 核心数（留 1-2 核给 Windows）
processors=8

# 端口转发（Windows 11 22H2+）
localhostForwarding=true

# 镜像网络模式（Windows 11 22H2+，让 WSL2 服务可被局域网访问）
networkingMode=mirrored

[experimental]
# 空闲时自动回收内存（勿用 gradual，与 systemd 冲突）
autoMemoryReclaim=dropcache

# 防止虚拟磁盘膨胀
sparseVhd=true
